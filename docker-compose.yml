services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pos_saas
      POSTGRES_USER: pos_saas
      POSTGRES_PASSWORD: pos_saas
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: dev-secret-key
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DATABASE_URL: postgres://pos_saas:pos_saas@db:5432/pos_saas
    depends_on:
      - db

volumes:
  postgres_data:
