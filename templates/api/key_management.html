{% extends "base.html" %}
{% block title %}API Keys | POS SaaS{% endblock %}
{% block content %}
<div class="space-y-6">
  <header class="glass rounded-3xl px-6 py-5 shadow-glow">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
      <div>
        <div class="text-sm uppercase tracking-[0.22em] text-emerald-200/80">Integration keys</div>
        <h1 class="mt-2 font-display text-3xl font-bold text-white sm:text-4xl">{{ tenant.name }}</h1>
        <p class="mt-2 text-sm text-slate-300">Create, reveal, and revoke API keys outside Django admin.</p>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <span class="chip">{{ tenant.slug }}</span>
        <a class="button-secondary rounded-2xl px-4 py-2 text-sm font-semibold" href="{% url 'dashboard' %}">Dashboard</a>
        <a class="button-secondary rounded-2xl px-4 py-2 text-sm font-semibold" href="{% url 'team-members' %}">Members</a>
      </div>
    </div>
  </header>

  {% include "api/partials/key_panel.html" %}
</div>
{% endblock %}
