<form method="get" class="page-section grid gap-3 md:grid-cols-2 xl:grid-cols-6" aria-label="{{ kind|title }} filters">
  <div class="form-field xl:col-span-2"><label for="filter-q">Search</label><input class="app-field" id="filter-q" name="q" value="{{ query }}" placeholder="{{ search_placeholder }}"></div>
  <div class="form-field"><label for="filter-from">From</label><input class="app-field" id="filter-from" type="date" name="date_from" value="{{ request.GET.date_from }}"></div>
  <div class="form-field"><label for="filter-to">To</label><input class="app-field" id="filter-to" type="date" name="date_to" value="{{ request.GET.date_to }}"></div>
  {% if statuses %}<div class="form-field"><label for="filter-status">Status</label><select class="app-field" id="filter-status" name="status"><option value="">All statuses</option>{% for value,label in statuses %}<option value="{{ value }}"{% if request.GET.status == value %} selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>{% endif %}
  {% if customer_filter %}<div class="form-field"><label for="filter-customer">Customer</label><select class="app-field" id="filter-customer" name="customer"><option value="">All customers</option><option value="walk_in"{% if request.GET.customer == "walk_in" %} selected{% endif %}>Walk-in customer</option>{% for customer in customers %}<option value="{{ customer.pk }}"{% if request.GET.customer == customer.pk|stringformat:"s" %} selected{% endif %}>{{ customer.name }}</option>{% endfor %}</select></div>{% endif %}
  {% if creators %}<div class="form-field"><label for="filter-creator">Creator</label><select class="app-field" id="filter-creator" name="creator"><option value="">All creators</option>{% for membership in creators %}<option value="{{ membership.user_id }}"{% if request.GET.creator == membership.user_id|stringformat:"s" %} selected{% endif %}>{{ membership.user }}</option>{% endfor %}</select></div>{% endif %}
  {% if cashiers and show_cashier_filter %}<div class="form-field"><label for="filter-cashier">Cashier</label><select class="app-field" id="filter-cashier" name="cashier"><option value="">All cashiers</option>{% for membership in cashiers %}<option value="{{ membership.user_id }}"{% if request.GET.cashier == membership.user_id|stringformat:"s" %} selected{% endif %}>{{ membership.user }}</option>{% endfor %}</select></div>{% endif %}
  {% if payment_methods %}<div class="form-field"><label for="filter-payment">Payment method</label><select class="app-field" id="filter-payment" name="payment_method"><option value="">All methods</option>{% for value,label in payment_methods %}<option value="{{ value }}"{% if request.GET.payment_method == value %} selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>{% endif %}
  <div class="flex items-end gap-2"><button class="button-primary" type="submit">Apply filters</button><a class="button-secondary" href="{{ reset_url }}">Reset</a></div>
</form>
