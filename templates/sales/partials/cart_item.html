{% load pos_format %}
<article class="register-line">
  <div class="register-line-head"><div class="min-w-0"><strong class="block break-words">{{ line.product.name }}</strong><span class="register-line-meta">{{ line.product.sku }}{% if line.stock_quantity is not None %} · {{ line.stock_quantity }} available{% else %} · Service{% endif %}</span></div><form method="post" data-submit-lock>{% csrf_token %}<input type="hidden" name="action" value="remove-line"><input type="hidden" name="product_id" value="{{ line.product.id }}"><button class="button-danger" type="submit" aria-label="Remove {{ line.product.name }} from sale">Remove</button></form></div>
  <div class="register-line-foot"><form class="register-quantity" method="post" data-submit-lock>{% csrf_token %}<input type="hidden" name="action" value="update-line"><input type="hidden" name="product_id" value="{{ line.product.id }}"><label class="sr-only" for="quantity-{{ line.product.id }}">Quantity for {{ line.product.name }}</label><input class="app-field" id="quantity-{{ line.product.id }}" type="number" name="quantity" min="1"{% if line.stock_quantity is not None %} max="{{ line.stock_quantity }}"{% endif %} value="{{ line.quantity }}"><button class="button-secondary" type="submit">Update</button></form><div class="text-right"><span class="register-line-meta block">{% money line.unit_price %} each</span><strong>{% money line.line_total %}</strong></div></div>
</article>
