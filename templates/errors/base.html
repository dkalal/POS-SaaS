<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>{{ title }} | POS SaaS</title>
  <style>
    :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #f8fafc; color: #0f172a; }
    main { width: min(34rem, calc(100% - 2rem)); padding: 2rem; border: 1px solid #e2e8f0; border-radius: 1.25rem; background: white; box-shadow: 0 20px 50px rgb(15 23 42 / .08); }
    small { color: #64748b; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
    h1 { margin: .75rem 0; font-size: clamp(1.75rem, 4vw, 2.5rem); }
    p { color: #475569; line-height: 1.6; }
    a { display: inline-block; margin-top: 1rem; padding: .75rem 1rem; border-radius: .75rem; background: #0f172a; color: white; text-decoration: none; font-weight: 700; }
    @media (prefers-color-scheme: dark) { body { background: #020617; color: #e2e8f0; } main { background: #0f172a; border-color: #334155; } p, small { color: #94a3b8; } a { background: #e2e8f0; color: #0f172a; } }
  </style>
</head>
<body>
  <main>
    <small>Error {{ code }}</small>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <a href="/">Return to the dashboard</a>
  </main>
</body>
</html>
