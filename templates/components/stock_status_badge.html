{% if product.current_stock == 0 %}<span class="status-pill status-danger">Out of stock</span>{% elif product.reorder_level and product.current_stock <= product.reorder_level %}<span class="status-pill status-warning">Low stock</span>{% elif not product.reorder_level %}<span class="status-pill">No threshold</span>{% else %}<span class="status-pill status-success">In stock</span>{% endif %}
