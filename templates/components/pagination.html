{% if page_obj.has_other_pages %}
  <nav class="pagination" aria-label="Pagination">
    <span>Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
    <span class="flex gap-2">
      {% if page_obj.has_previous %}<a class="button-secondary" href="?{% if query_string %}{{ query_string }}&amp;{% endif %}page={{ page_obj.previous_page_number }}">Previous</a>{% endif %}
      {% if page_obj.has_next %}<a class="button-secondary" href="?{% if query_string %}{{ query_string }}&amp;{% endif %}page={{ page_obj.next_page_number }}">Next</a>{% endif %}
    </span>
  </nav>
{% endif %}
