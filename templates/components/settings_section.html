<section class="page-section" id="settings-{{ section }}">
  <div class="table-toolbar"><div><h2>{{ title }}</h2><p>{{ description }}</p></div></div>
  <form class="grid gap-4" method="post" action="{% url 'workspace-settings' %}#settings-{{ section }}">{% csrf_token %}<input type="hidden" name="section" value="{{ section }}">{% if form.non_field_errors %}<div class="message-error">{{ form.non_field_errors }}</div>{% endif %}<div class="grid gap-4 md:grid-cols-2">{% for field in form %}{% include "components/form_field.html" with field=field %}{% endfor %}</div><button class="button-primary justify-self-start" type="submit">Save {{ title|lower }}</button></form>
</section>
